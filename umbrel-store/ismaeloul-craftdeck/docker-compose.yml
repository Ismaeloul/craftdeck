version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ismaeloul-craftdeck_web_1
      APP_PORT: "8449"

  web:
    image: node:22-bookworm-slim
    container_name: ismaeloul-craftdeck_web_1
    restart: unless-stopped
    # el backend detiene los servidores de Minecraft con orden 'stop' antes de salir
    stop_grace_period: 1m
    working_dir: /app/backend
    # primer arranque: npm install (queda cacheado en APP_DATA_DIR); luego arranca al momento
    command: sh -c "npm install --no-audit --no-fund && npm start"
    environment:
      - PORT=8449
      - CRAFTDECK_DATA=/data
    volumes:
      - ${APP_DATA_DIR}/backend:/app/backend
      - ${APP_DATA_DIR}/frontend:/app/frontend
      - ${APP_DATA_DIR}/data:/data
    ports:
      # puertos de juego: los clientes de Minecraft se conectan directo a estos
      - "25565-25574:25565-25574"
